image:
  repository: lorded/hermes
  tag: "0.15.2"
  pullPolicy: IfNotPresent

replicaCount: 0

# Name of an existing Secret with keys:
#   TELEGRAM_BOT_TOKEN          — bot token from @BotFather
#   TELEGRAM_ALLOWED_USERS      — comma-separated Telegram user IDs
#   HERMES_AUTH_JSON_BOOTSTRAP  — JSON content of google_oauth.json
existingSecret: hermes-secrets

persistence:
  enabled: true
  storageClass: "local-path"
  size: 5Gi
  accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

dashboard:
  ingress:
    enabled: true
    host: "dashboard.hermes.dev.tr"
    serviceName: hermes-native
    servicePort: 9119

# ── Hermes config.yaml ────────────────────────────────────────────────────────
# All keys here are rendered verbatim into /opt/data/config.yaml.
# Secrets (tokens, OAuth) come from existingSecret env vars, not here.
config:
  model:
    default: qwen3-max
    provider: custom
    base_url: http://qwen-proxy.rag-system.svc.cluster.local:3264/api

  providers:
    custom:
      api_key: no-key-required
      request_timeout_seconds: 360
      stale_timeout_seconds: 300

  # MCP servers running in the rag-system namespace.
  # Playwright uses SSE at /sse; the others use Streamable HTTP at /mcp.
  mcp_servers:
    playwright:
      url: "http://playwright-mcp.rag-system.svc.cluster.local:8931/sse"
      transport: sse
      timeout: 300
      connect_timeout: 15
    duckduckgo:
      url: "http://duckduckgo-mcp.rag-system.svc.cluster.local:8000/mcp"
      timeout: 60
    searxng:
      url: "http://searxng-mcp.rag-system.svc.cluster.local:8000/mcp"
      timeout: 60
    filesystem:
      url: "http://filesystem-mcp.rag-system.svc.cluster.local:8000/mcp"
      timeout: 60
    python_repl:
      url: "http://python-repl-mcp.rag-system.svc.cluster.local:8808/mcp"
      timeout: 120
    postgres:
      url: "http://mcp-postgres.rag-system.svc.cluster.local:8808/mcp"
      timeout: 60

  platform_toolsets:
    telegram:
      - web
      - browser
      - terminal
      - file
      - vision
      - skills
      - todo
      - memory
      - code_execution
      - messaging

  agent:
    max_turns: 60
    gateway_timeout: 1800
    restart_drain_timeout: 180
    api_max_retries: 6
    reasoning_effort: medium

  terminal:
    backend: local
    timeout: 180
    persistent_shell: true
    lifetime_seconds: 300

  compression:
    enabled: true
    threshold: 0.5
    target_ratio: 0.2
    protect_last_n: 20

  approvals:
    mode: manual
    timeout: 60
    cron_mode: deny

  logging:
    level: INFO
    max_size_mb: 5
    backup_count: 3
