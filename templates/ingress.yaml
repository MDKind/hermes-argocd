{{- if .Values.dashboard.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hermes.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
spec:
  rules:
    - host: {{ .Values.dashboard.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ default (include "hermes.fullname" .) .Values.dashboard.ingress.serviceName }}
                port:
                  number: {{ default 9119 .Values.dashboard.ingress.servicePort }}
  tls:
    - hosts:
        - {{ .Values.dashboard.ingress.host }}
      secretName: hermes-dashboard-tls
{{- end }}
