apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Hermes holds stateful sessions and one OAuth token — only one replica at a time.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hermes.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hermes.selectorLabels" . | nindent 8 }}
      annotations:
        # Restart when ConfigMap changes (config.yaml hash)
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        # gosu/tini inside the container handle privilege dropping to UID 10000
        runAsNonRoot: false
      initContainers:
        - name: setup-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/data/auth
              chown 10000:10000 /opt/data/auth
              chmod 700 /opt/data/auth
              if [ ! -f /opt/data/auth/google_oauth.json ]; then
                printf '%s' "$HERMES_AUTH_JSON_BOOTSTRAP" > /opt/data/auth/google_oauth.json
              fi
              chown 10000:10000 /opt/data/auth/google_oauth.json
              chmod 600 /opt/data/auth/google_oauth.json
          env:
            - name: HERMES_AUTH_JSON_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: HERMES_AUTH_JSON_BOOTSTRAP
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["gateway", "run"]
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: TELEGRAM_ALLOWED_USERS
            - name: HERMES_AUTH_JSON_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: HERMES_AUTH_JSON_BOOTSTRAP
          volumeMounts:
            - name: data
              mountPath: /opt/data
            # config.yaml subPath mount overlays the PVC path so Hermes reads
            # the Helm-managed config instead of a bootstrapped default.
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["test", "-f", "/opt/data/gateway.pid"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hermes.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "hermes.fullname" . }}-config
