apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Hermes holds stateful sessions and one OAuth token — only one replica at a time.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hermes.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hermes.selectorLabels" . | nindent 8 }}
      annotations:
        # Restart when ConfigMap changes (config.yaml hash)
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        # s6-overlay (PID 1 = /init) handles privilege dropping to UID 10000
        runAsNonRoot: false
      initContainers:
        - name: setup-ssh
          image: busybox
          command:
            - sh
            - -c
            - |
              set -e
              # Copy SSH keys from PVC (home/) to /root/.ssh so that SSH commands
              # run as root (the actual process user) can authenticate to Pi5.
              # HOME is /opt/data/home but SSH resolves config via the real UID's
              # home directory (/root), not $HOME — so both paths must be populated.
              mkdir -p /root/.ssh
              chmod 700 /root/.ssh
              if [ -f /opt/data/home/.ssh/id_ed25519 ]; then
                cp /opt/data/home/.ssh/id_ed25519 /root/.ssh/id_ed25519
                chmod 600 /root/.ssh/id_ed25519
              fi
              if [ -f /opt/data/home/.ssh/config ]; then
                cp /opt/data/home/.ssh/config /root/.ssh/config
                chmod 600 /root/.ssh/config
              fi
              if [ -f /opt/data/home/.ssh/known_hosts ]; then
                cp /opt/data/home/.ssh/known_hosts /root/.ssh/known_hosts
                chmod 600 /root/.ssh/known_hosts
              fi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: root-ssh
              mountPath: /root/.ssh
      containers:
        - name: hermes
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["gateway", "run"]
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: TELEGRAM_ALLOWED_USERS
            - name: HERMES_AUTH_JSON_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: HERMES_AUTH_JSON_BOOTSTRAP
            # Dashboard: managed by s6-overlay as a supervised service
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: HERMES_DASHBOARD_SESSION_TOKEN
            # Point HOME to the PVC so ~/.qwen/oauth_creds.json and other
            # user-level auth files survive pod restarts.
            - name: HOME
              value: /opt/data/home
          ports:
            - containerPort: 9119
              name: dashboard
          volumeMounts:
            - name: data
              mountPath: /opt/data
            # config.yaml subPath mount overlays the PVC path so Hermes reads
            # the Helm-managed config instead of a bootstrapped default.
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            # SSH keys for root — populated by setup-ssh initContainer from PVC.
            - name: root-ssh
              mountPath: /root/.ssh
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["test", "-f", "/opt/data/gateway.pid"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hermes.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "hermes.fullname" . }}-config
        - name: root-ssh
          emptyDir: {}
