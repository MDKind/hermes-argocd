apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Hermes holds stateful sessions and one OAuth token — only one replica at a time.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hermes.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hermes.selectorLabels" . | nindent 8 }}
      annotations:
        # Restart when ConfigMap changes (config.yaml hash)
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        # s6-overlay (PID 1 = /init) handles privilege dropping to UID 10000
        runAsNonRoot: false
      containers:
        - name: hermes
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["gateway", "run"]
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: TELEGRAM_ALLOWED_USERS
            - name: HERMES_AUTH_JSON_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: HERMES_AUTH_JSON_BOOTSTRAP
            # Dashboard: managed by s6-overlay as a supervised service
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: HERMES_DASHBOARD_SESSION_TOKEN
          ports:
            - containerPort: 9119
              name: dashboard
          volumeMounts:
            - name: data
              mountPath: /opt/data
            # config.yaml subPath mount overlays the PVC path so Hermes reads
            # the Helm-managed config instead of a bootstrapped default.
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["test", "-f", "/opt/data/gateway.pid"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hermes.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "hermes.fullname" . }}-config
