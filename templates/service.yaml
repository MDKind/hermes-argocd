apiVersion: v1
kind: Service
metadata:
  name: {{ include "hermes.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "hermes.selectorLabels" . | nindent 4 }}
  ports:
    - name: dashboard
      port: 9119
      targetPort: 9119
